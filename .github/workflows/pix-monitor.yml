name: PIX Monitor

on:
  schedule:
    # Roda a cada 5 minutos
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # Permite rodar manualmente pelo GitHub

jobs:
  check-pix:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: 📥 Clonar repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 📦 Instalar dependências
        working-directory: pix-monitor
        run: pip install -r requirements.txt

      - name: 🏦 Verificar PIXs
        working-directory: pix-monitor
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SITE_WEBHOOK_URL: ${{ secrets.SITE_WEBHOOK_URL }}
          SITE_WEBHOOK_SECRET: ${{ secrets.SITE_WEBHOOK_SECRET }}
          BOT_NAME: "Nubank PIX Monitor"
          CHECK_INTERVAL: "30"
          DB_PATH: /tmp/pix-monitor.db
        run: python main.py --once